<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Lilac English</title>
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+1p:wght@400;500;700&family=Montserrat:wght@700;800&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#ede7f8;--bg2:#e2d8f4;--card:#faf7ff;--card2:#f0eafc;
  --accent:#7040d0;--accent2:#c044a0;--lavender:#9060d8;
  --ok:#00d381;--good:#d07000;--ng:#d02858;--text:#18083a;--muted:#8878b4;--border:#cfc0ec;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Inter','M PLUS 1p',sans-serif;overflow:hidden;user-select:none}
.screen{position:fixed;inset:0;display:flex;flex-direction:column;transition:opacity .28s,transform .28s}
.screen.hidden{opacity:0;pointer-events:none;transform:translateY(14px)}

/* HOME */
#home{overflow-y:auto;padding-bottom:50px}
.home-hero{padding:56px 24px 16px;background:radial-gradient(ellipse at 70% 0%,rgba(144,96,216,.22),transparent 65%)}
.app-title{font-family:'Montserrat',sans-serif;font-size:34px;font-weight:800;letter-spacing:.01em}
.app-title .lilac{color:var(--accent2)}
.app-title .english{color:var(--accent)}
.app-sub{color:var(--muted);font-size:11px;margin-top:5px;letter-spacing:.18em;font-family:'Inter',sans-serif;font-weight:600}
.sec-label{padding:18px 24px 8px;font-size:10px;color:var(--muted);letter-spacing:.2em;font-family:'Inter',sans-serif;font-weight:700}
.mode-row{display:flex;gap:8px;padding:0 24px 4px}
.mode-btn{flex:1;padding:11px 6px;border-radius:12px;border:1.5px solid var(--border);background:var(--card);color:var(--muted);font-size:12px;font-family:'Inter','M PLUS 1p',sans-serif;cursor:pointer;transition:all .2s}
.mode-btn.active{border-color:var(--accent);color:var(--accent);background:rgba(112,64,208,.1)}
.random-btn{display:block;margin:14px 24px;padding:16px;border-radius:16px;background:linear-gradient(135deg,var(--lavender),var(--accent),var(--accent2));border:none;color:white;font-size:15px;font-family:'Inter','M PLUS 1p',sans-serif;font-weight:700;cursor:pointer;width:calc(100% - 48px);letter-spacing:.05em;box-shadow:0 6px 28px rgba(112,64,208,.32);transition:opacity .15s,transform .1s}
.random-btn:active{opacity:.82;transform:scale(.97)}
.chapter-list{padding:0 24px;display:flex;flex-direction:column;gap:10px}
.chapter-block{background:var(--card);border-radius:16px;overflow:hidden;border:1px solid var(--border)}
.chapter-head{padding:12px 16px;font-size:11px;font-weight:700;color:var(--muted);letter-spacing:.16em;display:flex;align-items:center;gap:8px;font-family:'Inter',sans-serif}
.chapter-head .badge{background:linear-gradient(135deg,var(--lavender),var(--accent2));color:white;font-size:10px;padding:2px 9px;border-radius:20px}
.lesson-btn{width:100%;padding:13px 16px;background:none;border:none;border-top:1px solid var(--border);color:var(--accent);font-size:16px;font-family:'Inter','M PLUS 1p',sans-serif;text-align:left;cursor:pointer;display:flex;justify-content:space-between;align-items:center;transition:background .1s}
.lesson-btn:active{background:var(--card2)}
.lesson-btn .cnt{font-size:11px;color:var(--muted);font-family:'Inter',sans-serif}

/* QUIZ */
#quiz{justify-content:flex-start}
.quiz-topbar{display:flex;align-items:center;justify-content:space-between;padding:50px 20px 8px;flex-shrink:0}
.back-btn{background:var(--card);border:1px solid var(--border);color:var(--text);font-size:16px;width:36px;height:36px;border-radius:10px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.quiz-meta{font-family:'Inter',sans-serif;font-size:11px;color:var(--muted);text-align:right;line-height:1.7}
.prog-wrap{height:3px;background:var(--border);margin:6px 20px 0;border-radius:3px;overflow:hidden;flex-shrink:0}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--lavender),var(--accent2));border-radius:3px;transition:width .4s ease}
.quiz-scroll{flex:1;overflow-y:auto;padding:14px 20px 10px;display:flex;flex-direction:column;gap:12px}
.lesson-tag{font-size:11px;color:var(--accent);font-family:'Inter',sans-serif;font-weight:600;letter-spacing:.1em}
.jp-card{background:linear-gradient(135deg,var(--card),var(--card2));border:1px solid var(--border);border-radius:18px;padding:24px 20px;position:relative;overflow:hidden}
.jp-card::before{content:'';position:absolute;top:-30px;right:-30px;width:130px;height:130px;background:radial-gradient(circle,rgba(144,96,216,.12),transparent 70%);pointer-events:none}
.jp-text{font-size:22px;font-weight:700;line-height:1.55;letter-spacing:.03em;font-family:'Inter','M PLUS 1p',sans-serif}

/* MIC ZONE */
.mic-zone{flex-shrink:0;display:flex;flex-direction:column;align-items:center;padding:8px 20px 32px;gap:12px}
.transcript-box{width:100%;min-height:46px;background:var(--card);border:1.5px solid var(--border);border-radius:12px;padding:12px 14px;font-size:16px;color:var(--text);line-height:1.5;font-style:italic;transition:border-color .3s;position:relative;font-family:'Inter','M PLUS 1p',sans-serif}
.transcript-box.active{border-color:var(--accent);background:rgba(112,64,208,.06)}
.transcript-ph{position:absolute;inset:0;display:flex;align-items:center;padding:0 14px;color:var(--muted);font-size:12px;font-style:normal;pointer-events:none;font-family:'Inter',sans-serif}
.timer-ring{position:relative;width:108px;height:108px}
.timer-ring svg{transform:rotate(-90deg)}
.ring-bg{fill:none;stroke:var(--border);stroke-width:5}
.ring-fg{fill:none;stroke:var(--accent);stroke-width:5;stroke-linecap:round;transition:stroke-dashoffset .12s linear,stroke .4s}
.timer-inner{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px}
.timer-sec{font-family:'Montserrat',sans-serif;font-size:30px;font-weight:700;line-height:1}
.timer-unit{font-size:10px;color:var(--muted);letter-spacing:.1em;font-family:'Inter',sans-serif}
.btn-row{display:flex;align-items:center;gap:14px}
.side-btn{width:48px;height:48px;border-radius:50%;background:var(--card);border:1.5px solid var(--border);color:var(--muted);font-size:19px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}
.side-btn:active{background:var(--card2);color:var(--accent)}
.side-btn:disabled{opacity:.3;pointer-events:none}
.mic-btn{width:72px;height:72px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:26px;transition:all .2s}
.mic-btn.idle{background:linear-gradient(135deg,var(--lavender),var(--accent2));box-shadow:0 4px 24px rgba(112,64,208,.36)}
.mic-btn.listening{background:linear-gradient(135deg,#b03090,#d850b0);animation:mpulse 1.1s ease-out infinite}
.mic-btn.judging{background:var(--card2);border:1.5px solid var(--border);opacity:.55;pointer-events:none}
.mic-btn:active{transform:scale(.93)}
@keyframes mpulse{0%{box-shadow:0 0 0 0 rgba(192,64,160,.45)}70%{box-shadow:0 0 0 18px transparent}100%{box-shadow:0 0 0 0 transparent}}
.mic-hint{font-size:11px;color:var(--muted);letter-spacing:.06em;font-family:'Inter',sans-serif}

/* RESULT */
#result-overlay{position:fixed;inset:0;background:rgba(20,8,50,.78);display:flex;align-items:flex-end;justify-content:center;z-index:200;transition:opacity .28s}
#result-overlay.hidden{opacity:0;pointer-events:none}
.result-sheet{background:var(--card);border:1px solid var(--border);border-radius:28px 28px 0 0;padding:24px 22px 40px;width:100%;max-width:480px;display:flex;flex-direction:column;gap:14px;position:relative}
.result-sheet::before{content:'';position:absolute;top:-40px;right:-40px;width:160px;height:160px;border-radius:50%;background:radial-gradient(circle,rgba(144,96,216,.14),transparent 70%);pointer-events:none}
.drag-handle{width:36px;height:4px;border-radius:2px;background:var(--border);margin:0 auto -2px}
.result-badge{display:flex;align-items:center;gap:12px}
.result-icon{font-size:30px;line-height:1;font-family:'Montserrat',sans-serif;font-weight:800;-webkit-text-stroke:5px currentColor}
.result-verdict{font-family:'Montserrat',sans-serif;font-size:30px;font-weight:800}
.result-verdict.ok{color:var(--ok)}
.result-verdict.good{color:var(--good)}
.result-verdict.ng{color:var(--ng)}
.result-sec{display:flex;flex-direction:column;gap:5px}
.result-lbl-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:0}
.speak-btn{background:none;border:none;cursor:pointer;color:var(--muted);padding:3px 5px;border-radius:6px;display:flex;align-items:center;transition:color .15s}
.speak-btn:active{color:var(--accent)}

.result-lbl{font-size:10px;color:var(--muted);letter-spacing:.16em;font-family:'Inter',sans-serif;font-weight:700}
.result-box{font-size:16px;line-height:1.6;padding:11px 13px;background:var(--bg2);border-radius:10px;border:1px solid var(--border);font-family:'Inter','M PLUS 1p',sans-serif}
.result-box.model{color:var(--accent);font-style:italic}
.result-comment{font-size:13px;line-height:1.75;padding:10px 13px;background:rgba(112,64,208,.07);border-left:3px solid var(--accent);border-radius:0 8px 8px 0;font-family:'Inter','M PLUS 1p',sans-serif}

.ask-section{display:flex;flex-direction:column;gap:8px}
.ask-row{display:flex;gap:8px;align-items:center}
.ask-input{flex:1;padding:10px 12px;background:var(--card2);border:1.5px solid var(--border);border-radius:10px;font-size:13px;font-family:'Inter','M PLUS 1p',sans-serif;color:var(--text);outline:none;transition:border-color .2s}
.ask-input:focus{border-color:var(--accent)}
.ask-input::placeholder{color:var(--muted);font-size:12px}
.ask-send-btn{width:38px;height:38px;border-radius:10px;background:linear-gradient(135deg,var(--lavender),var(--accent2));border:none;color:white;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:opacity .15s}
.ask-send-btn:active{opacity:.8}
.ask-send-btn:disabled{opacity:.38;pointer-events:none}
.ask-response{font-size:13px;line-height:1.8;padding:10px 13px;background:rgba(112,64,208,.05);border-left:3px solid var(--accent2);border-radius:0 8px 8px 0;font-family:'Inter','M PLUS 1p',sans-serif;display:none;white-space:pre-wrap}
.ask-response.visible{display:block}
.result-actions{display:flex;gap:10px;margin-top:2px}
.rbtn{flex:1;padding:14px;border-radius:12px;border:none;font-size:15px;font-family:'Inter','M PLUS 1p',sans-serif;font-weight:700;cursor:pointer;transition:opacity .15s;letter-spacing:.04em}
.rbtn:active{opacity:.8}
.rbtn.next{background:linear-gradient(135deg,var(--lavender),var(--accent2));color:white;box-shadow:0 4px 18px rgba(112,64,208,.3)}
.rbtn.again{background:var(--card2);border:1.5px solid var(--border);color:var(--text)}

/* COMPLETE */
#complete{background:var(--bg);align-items:center;justify-content:center;padding:36px 28px;text-align:center;gap:18px}
.complete-emoji{animation:sway 3.5s ease-in-out infinite;color:var(--accent2)}
@keyframes sway{0%,100%{transform:rotate(-6deg)}50%{transform:rotate(6deg)}}
.complete-h{font-family:'Montserrat',sans-serif;font-size:36px;color:var(--accent);font-weight:800}
.complete-sub{color:var(--muted);font-size:13px;line-height:1.9;font-family:'Inter','M PLUS 1p',sans-serif}
.complete-stats{display:flex;gap:12px}
.s-box{flex:1;background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px 10px;display:flex;flex-direction:column;align-items:center;gap:4px}
.s-num{font-family:'Montserrat',sans-serif;font-size:26px;font-weight:700;color:var(--accent)}
.s-lbl{font-size:10px;color:var(--muted);letter-spacing:.12em;font-family:'Inter',sans-serif}
.complete-home-btn{padding:15px 36px;border-radius:16px;background:linear-gradient(135deg,var(--lavender),var(--accent2));border:none;color:white;font-size:15px;font-family:'Inter','M PLUS 1p',sans-serif;font-weight:700;cursor:pointer;box-shadow:0 4px 24px rgba(112,64,208,.32)}

/* WORD TOKENS */
.wt{cursor:pointer;border-radius:3px;padding:1px 0;transition:background .12s}
.wt:hover{background:rgba(112,64,208,.13)}
.wt:active{background:rgba(112,64,208,.24)}
.wt.saving{opacity:.45;pointer-events:none}
.wt.saved{color:var(--accent2)!important;border-bottom:1.5px dotted var(--accent2);font-style:normal!important}

/* VOCAB HOME BUTTON */
.vocab-home-btn{display:flex;align-items:center;justify-content:space-between;margin:8px 24px 0;padding:13px 16px;background:var(--card);border:1.5px solid var(--border);border-radius:14px;cursor:pointer;font-family:'Inter','M PLUS 1p',sans-serif;font-size:13px;font-weight:600;color:var(--text);transition:background .15s;width:calc(100% - 48px)}
.vocab-home-btn:active{background:var(--card2)}
.vocab-home-btn-left{display:flex;align-items:center;gap:9px;color:var(--accent)}
.vocab-badge{background:linear-gradient(135deg,var(--lavender),var(--accent2));color:white;font-size:11px;font-weight:700;padding:2px 10px;border-radius:20px;font-family:'Inter',sans-serif;min-width:22px;text-align:center}

/* VOCAB SCREEN */
#vocab{overflow-y:auto;background:var(--bg);padding-bottom:40px}
.vocab-topbar{display:flex;align-items:center;justify-content:space-between;padding:50px 20px 10px;position:sticky;top:0;background:var(--bg);z-index:10}
.vocab-title{font-family:'Montserrat',sans-serif;font-size:17px;font-weight:800;color:var(--accent)}
.vocab-clear-btn{font-size:12px;color:var(--muted);background:none;border:none;cursor:pointer;padding:6px 10px;border-radius:8px;font-family:'Inter',sans-serif}
.vocab-clear-btn:active{background:var(--card2)}
.vocab-count{font-size:12px;color:var(--muted);padding:4px 22px 10px;font-family:'Inter',sans-serif;letter-spacing:.05em}
.vocab-list{padding:0 20px;display:flex;flex-direction:column;gap:8px}
.vocab-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px 16px;display:flex;align-items:center;gap:12px;animation:vc-in .22s ease}
@keyframes vc-in{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.vocab-word{font-family:'Inter',sans-serif;font-size:15px;font-weight:700;color:var(--accent);flex:0 0 auto;min-width:90px}
.vocab-meaning{font-size:13px;color:var(--text);font-family:'Inter','M PLUS 1p',sans-serif;flex:1;line-height:1.5}
.vocab-del{background:none;border:none;cursor:pointer;color:var(--border);padding:4px;border-radius:6px;transition:color .15s;flex-shrink:0;display:flex;align-items:center}
.vocab-del:active{color:var(--ng)}
.vocab-edit-btn{background:none;border:none;cursor:pointer;color:var(--border);padding:4px;border-radius:6px;transition:color .15s;flex-shrink:0;display:flex;align-items:center}
.vocab-edit-btn:active{color:var(--accent)}
.vocab-empty{text-align:center;padding:60px 24px 20px;color:var(--muted);font-size:15px;font-family:'Inter','M PLUS 1p',sans-serif;line-height:2.2}
.vocab-empty svg{display:block;margin:0 auto 12px;color:var(--border)}
.vocab-add-form{padding:0 20px 12px;display:flex;flex-direction:column;gap:7px}
.vocab-add-row{display:flex;gap:7px;align-items:center}
.vocab-input{flex:1;padding:9px 11px;background:var(--card);border:1.5px solid var(--border);border-radius:10px;font-size:13px;font-family:'Inter','M PLUS 1p',sans-serif;color:var(--text);outline:none;transition:border-color .2s;-webkit-user-select:text;user-select:text}
.vocab-input:focus{border-color:var(--accent)}
.vocab-input::placeholder{color:var(--muted);font-size:12px}
.vocab-add-btn{height:38px;padding:0 14px;border-radius:10px;background:linear-gradient(135deg,var(--lavender),var(--accent2));border:none;color:white;font-size:13px;font-family:'Inter',sans-serif;font-weight:700;cursor:pointer;flex-shrink:0;transition:opacity .15s;white-space:nowrap}
.vocab-add-btn:active{opacity:.8}
.vocab-add-btn:disabled{opacity:.38;pointer-events:none}
.vocab-card.editing{border-color:var(--accent);background:rgba(112,64,208,.04);flex-wrap:wrap;gap:8px}
.vocab-ok-btn{background:none;border:none;cursor:pointer;color:var(--ok);padding:4px;border-radius:6px;flex-shrink:0;display:flex;align-items:center;transition:color .15s}
.vocab-ok-btn:active{opacity:.7}

/* TOAST */
.word-toast{position:fixed;bottom:96px;left:50%;transform:translateX(-50%) translateY(12px);background:rgba(24,8,58,.9);color:white;font-size:13px;padding:10px 20px;border-radius:22px;font-family:'Inter','M PLUS 1p',sans-serif;white-space:nowrap;pointer-events:none;opacity:0;transition:opacity .22s,transform .22s;z-index:999;max-width:90vw;text-overflow:ellipsis;overflow:hidden}
.word-toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<!-- HOME -->
<div class="screen" id="home">
  <div class="home-hero">
    <div class="app-title"><span class="lilac">Lilac</span> <span class="english">English</span></div>
    <div class="app-sub">SPEAK · BLOOM · REPEAT</div>
  </div>
  <div class="sec-label">MODE</div>
  <div class="mode-row">
    <button class="mode-btn active" id="btn-lesson" onclick="setMode('lesson')">レッスン順</button>
    <button class="mode-btn" id="btn-random" onclick="setMode('random')">ランダム</button>
  </div>
  <button class="random-btn" onclick="startRandom()"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/></svg> ランダム20問で始める</button>
  <button class="vocab-home-btn" onclick="showVocabScreen()">
    <div class="vocab-home-btn-left"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>単語帳</div>
    <span class="vocab-badge" id="vocab-badge">0</span>
  </button>
  <div class="sec-label">CHAPTER / LESSON</div>
  <div class="chapter-list" id="chapter-list"></div>
</div>

<!-- QUIZ -->
<div class="screen hidden" id="quiz">
  <div class="quiz-topbar">
    <button class="back-btn" onclick="goHome()"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg></button>
    <div class="quiz-meta">
      <div id="quiz-title-lbl">be動詞</div>
      <div id="quiz-prog-lbl">1 / 10</div>
    </div>
  </div>
  <div class="prog-wrap"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
  <div class="quiz-scroll">
    <div class="lesson-tag" id="lesson-tag">CHAPTER 1 · LESSON 1</div>
    <div class="jp-card"><div class="jp-text" id="jp-text">私は学生です。</div></div>
  </div>
  <div class="mic-zone">
    <div class="transcript-box" id="transcript-box">
      <span class="transcript-ph" id="transcript-ph">録音後、ここに認識結果が表示されます</span>
      <span id="transcript-txt"></span>
    </div>
    <div class="timer-ring">
      <svg width="108" height="108" viewBox="0 0 108 108">
        <circle class="ring-bg" cx="54" cy="54" r="47"/>
        <circle class="ring-fg" id="ring-fg" cx="54" cy="54" r="47" stroke-dasharray="295.3" stroke-dashoffset="0"/>
      </svg>
      <div class="timer-inner">
        <div class="timer-sec" id="timer-sec">12</div>
        <div class="timer-unit">SEC</div>
      </div>
    </div>
    <div class="btn-row">
      <button class="side-btn" id="retry-btn" onclick="retryQ()" disabled>↺</button>
      <button class="mic-btn idle" id="mic-btn" onclick="onMicTap()"><svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg></button>
      <div style="width:48px"></div>
    </div>
    <div class="mic-hint" id="mic-hint">タップして録音開始</div>
  </div>
</div>

<!-- RESULT -->
<div id="result-overlay" class="hidden">
  <div class="result-sheet">
    <div class="drag-handle"></div>
    <div class="result-badge">
      <div class="result-icon" id="res-icon"></div>
      <div class="result-verdict ok" id="res-verdict">Excellent!</div>

const QUESTIONS = CSV_DATA.map(r => ({chapter:+r[0],lesson:+r[1],title:r[2],jp:r[3],en:r[4]}));
const CHAPTERS = {};
QUESTIONS.forEach(q => {
  if(!CHAPTERS[q.chapter]) CHAPTERS[q.chapter]={};
  if(!CHAPTERS[q.chapter][q.lesson]) CHAPTERS[q.chapter][q.lesson]={title:q.title,qs:[]};
  CHAPTERS[q.chapter][q.lesson].qs.push(q);
});

let currentMode='lesson', queue=[], qIdx=0, correctCount=0;
let qJudged=false, qCorrect=false;
let timerInterval=null, timeLeft=MAX_SEC;
let recognition=null, isListening=false, isJudging=false;
let mediaRecorder=null, recordedAudioUrl=null, recordingSession=0;
let ttsGen=0, ttsEnabled=false;
let askHistory=[], askContext={};
let currentTranscript='';

function buildHome(){
  const list=document.getElementById('chapter-list');
  list.innerHTML='';
  Object.keys(CHAPTERS).forEach(ch=>{
    const block=document.createElement('div');
    block.className='chapter-block';
    const head=document.createElement('div');
    head.className='chapter-head';
    head.innerHTML=`CHAPTER ${ch} <span class="badge">Ch.${ch}</span>`;
    block.appendChild(head);
    Object.keys(CHAPTERS[ch]).forEach(ls=>{
      const info=CHAPTERS[ch][ls];
      const btn=document.createElement('button');
      btn.className='lesson-btn';
      btn.innerHTML=`<span>${info.title}</span><span class="cnt">${info.qs.length}問</span>`;
      btn.onclick=()=>startLesson(+ch,+ls);
      block.appendChild(btn);
    });
    list.appendChild(block);
  });
}

function setMode(m){
  currentMode=m;
  document.getElementById('btn-lesson').classList.toggle('active',m==='lesson');
  document.getElementById('btn-random').classList.toggle('active',m==='random');
}

function startLesson(ch,ls){
  queue=[...CHAPTERS[ch][ls].qs];
  if(currentMode==='random') shuffle(queue);
  beginQuiz(`Ch.${ch} · ${CHAPTERS[ch][ls].title}`);
}

function startRandom(){
  queue=shuffle([...QUESTIONS]).slice(0,20);
  beginQuiz('ランダム 20問');
}

function beginQuiz(title){
  qIdx=0; correctCount=0;
  show('quiz');
  document.getElementById('quiz-title-lbl').textContent=title;
  loadQuestion();
}

function loadQuestion(){
  if(qIdx>=queue.length){showComplete();return;}
  qJudged=false; qCorrect=false;
  const q=queue[qIdx];
  document.getElementById('jp-text').textContent=q.jp;
  document.getElementById('lesson-tag').textContent=`CHAPTER ${q.chapter} · LESSON ${q.lesson} · ${q.title}`;
  document.getElementById('quiz-prog-lbl').textContent=`${qIdx+1} / ${queue.length}`;
  document.getElementById('prog-fill').style.width=`${(qIdx/queue.length)*100}%`;
  resetMicUI();
  startListening();
}

function startTimer(){
  timeLeft=MAX_SEC; updateRing(MAX_SEC);
  clearInterval(timerInterval);
  timerInterval=setInterval(()=>{
    timeLeft--; updateRing(timeLeft);
    if(timeLeft<=0){clearInterval(timerInterval);autoJudge();}
  },1000);
}

function updateRing(sec){
  document.getElementById('timer-sec').textContent=sec;
  const offset=CIRC*(1-sec/MAX_SEC);
  const fg=document.getElementById('ring-fg');
  fg.style.strokeDashoffset=offset;
  const p=sec/MAX_SEC;
  fg.style.stroke=p>0.5?'var(--accent)':p>0.25?'#e8c060':'var(--ng)';
}

function stopTimer(){clearInterval(timerInterval);}

function initRecognition(){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){alert('音声認識はSafariで開いてください。');return null;}
  const r=new SR();
  r.continuous=true; r.interimResults=true; r.lang='en-US';
  r.onresult=e=>{
    let interim='',final='';
    for(let i=e.resultIndex;i<e.results.length;i++){
      const t=e.results[i][0].transcript;
      if(e.results[i].isFinal) final+=t; else interim+=t;
    }
    currentTranscript=(currentTranscript+final).trim();
    showTranscript(currentTranscript+(interim?' '+interim:''));
  };
  r.onerror=e=>{if(e.error!=='no-speech')console.log('SR:',e.error);};
  r.onend=()=>{if(r===recognition&&isListening&&!isJudging){try{r.start();}catch(e){}}};
  return r;
}

function startListening(){
  currentTranscript=''; showTranscript('');
  isListening=true; isJudging=false;
  if(recordedAudioUrl){URL.revokeObjectURL(recordedAudioUrl);recordedAudioUrl=null;}
  const session=++recordingSession;
  const chunks=[];
  const startRecognition=()=>{
    recognition=initRecognition();
    if(!recognition)return;
    try{recognition.start();}catch(e){}
    setMicState('listening');
    document.getElementById('retry-btn').disabled=false;
    startTimer();
  };
  navigator.mediaDevices.getUserMedia({audio:true}).then(stream=>{
    if(session!==recordingSession){stream.getTracks().forEach(t=>t.stop());return;}
    const mr=new MediaRecorder(stream);
    mr.ondataavailable=e=>{if(e.data.size>0)chunks.push(e.data);};
    mr.onstop=()=>{
      if(session===recordingSession){
        const blob=new Blob(chunks,{type:'audio/webm'});
        recordedAudioUrl=URL.createObjectURL(blob);
      }
      stream.getTracks().forEach(t=>t.stop());
    };
    mr.start();
    mediaRecorder=mr;
    startRecognition();
  }).catch(()=>{
    startRecognition();
  });
}

function stopListening(){
  isListening=false; stopTimer();
  if(recognition){try{recognition.stop();}catch(e){} recognition=null;}
  if(mediaRecorder&&mediaRecorder.state!=='inactive'){mediaRecorder.stop();mediaRecorder=null;}
}

function onMicTap(){
  if(isJudging)return;
  if(isListening){stopListening();setTimeout(()=>judge(currentTranscript),400);}
  else{retryQ();}
}

function autoJudge(){stopListening();setTimeout(()=>judge(currentTranscript),400);}

function retryQ(){
  stopListening();
  currentTranscript=''; showTranscript('');
  resetMicUI(); startListening();
}


async function askAI(){
  const input=document.getElementById('ask-input');
  const btn=document.getElementById('ask-send-btn');
  const resp=document.getElementById('ask-response');
  const q=input.value.trim();
  if(!q)return;
  input.value='';
  btn.disabled=true;
  resp.textContent='考え中...';
  resp.classList.add('visible');
  const system=`あなたは英語学習アプリのAIアシスタントです。以下の採点セッションの文脈で学習者の質問に日本語で簡潔に答えてください。

【採点セッション情報】
日本語問題: ${askContext.jp}
模範解答: ${askContext.en}
学習者の回答: ${askContext.userAns}
AIの採点コメント: ${askContext.comment}

「なぜ？」「どうして？」などの短い質問は、直前のAIの採点コメントまたはAIの返答に対する質問として解釈してください。
日本語で答えてください。`;
  askHistory.push({role:'user',content:q});
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':API_KEY,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({
        model:'claude-haiku-4-5-20251001',max_tokens:400,
        system,
        messages:askHistory
      })
    });
    const data=await res.json();
    const answer=data.content?.[0]?.text||'エラーが発生しました。';
    askHistory.push({role:'assistant',content:answer});
    resp.innerHTML=makeWordTokens(answer);
  }catch(e){
    askHistory.pop();
    resp.textContent='エラーが発生しました。';
  }
  btn.disabled=false;
}
async function judge(transcript){
  if(isJudging)return;
  isJudging=true; setMicState('judging');
  document.getElementById('mic-hint').textContent='判定中...';
  const q=queue[qIdx];
  const answer=transcript.trim().replace(/^./,c=>c.toUpperCase());
  const norm=s=>s.toLowerCase().replace(/[^\w\s]/g,'').replace(/\s+/g,' ').trim();
  const compact=s=>s.toLowerCase().replace(/[^a-z0-9]/g,'');
  if(norm(answer)===norm(q.en)||compact(answer)===compact(q.en)){showResult('perfect',answer,q.en,'完璧な一致！素晴らしい！');return;}
  if(!answer){showResult('wrong','（認識できませんでした）',q.en,'音声が認識されませんでした。もう一度試しましょう。');return;}
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':API_KEY,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({
        model:'claude-haiku-4-5-20251001',max_tokens:100,
        messages:[{role:'user',content:`英語スピーキング練習の採点をしてください。\n日本語問題:${q.jp}\n模範解答:${q.en}\n学習者の回答:${answer}\n\n【採点ルール】\n・level="perfect":模範解答と全く同じ意味・表現で完璧\n・level="good":意味は通じるが、より一般的・自然な表現が模範解答にある場合。その場合コメントで「〇〇の方がより自然です」と教える\n・level="wrong":意味が伝わらない、または大きな文法ミスがある\n・コメントは回答に実際に存在する誤りや改善点のみ指摘すること\n・存在しない誤りや、既に正しい部分への指摘は絶対にしない\n\nJSONのみ返答:{"level":"perfect"/"good"/"wrong","comment":"日本語30字以内"}`}]
      })
    });
    const data=await res.json();
    const text=data.content?.[0]?.text||'{}';
    const parsed=JSON.parse(text.replace(/```json|```/g,'').trim());
    const lv=parsed.level||'wrong';
    showResult(lv,answer,q.en,parsed.comment||(lv==='wrong'?'もう少し練習しましょう。':'よくできました！'));
  }catch(e){
    showResult('wrong',answer,q.en,'APIエラー。APIキーを確認してください。');
  }
}

function speakText(text){
  if(!ttsEnabled)return;
  window.speechSynthesis.cancel();
  const gen=++ttsGen;
  setTimeout(()=>{
    if(gen!==ttsGen||!ttsEnabled)return;
    const utt=new SpeechSynthesisUtterance(text);
    utt.lang='en-US'; utt.rate=0.88;
    const voices=window.speechSynthesis.getVoices();
    const voice=voices.find(vv=>vv.lang==='en-US'&&/Samantha|Alex|Google US|Aaron|Fred/.test(vv.name))
               ||voices.find(vv=>vv.lang==='en-US');
    if(voice)utt.voice=voice;
    window.speechSynthesis.speak(utt);
  },80);
}
function speakModel(text){speakText(text);}
function showResult(level,userAns,modelAns,comment){
  ttsEnabled=true;
  const isCorrect=level==='perfect'||level==='good';
  if(qJudged&&qCorrect)correctCount--;
  if(isCorrect){correctCount++;playCorrect(()=>speakText(modelAns));}else{playWrong(()=>speakText(modelAns));}
  qJudged=true; qCorrect=isCorrect;
  const icon=document.getElementById('res-icon');
  icon.textContent=isCorrect?'○':'✕';
  icon.style.color=level==='perfect'?'var(--ok)':level==='good'?'var(--good)':'var(--ng)';
  const v=document.getElementById('res-verdict');
  v.textContent=level==='perfect'?'Excellent!':level==='good'?'Good!':'Keep going!';
  v.className='result-verdict '+(level==='perfect'?'ok':level==='good'?'good':'ng');
  document.getElementById('res-your').innerHTML=userAns?makeWordTokens(userAns):'（なし）';
  document.getElementById('speak-your-btn').onclick=()=>{if(recordedAudioUrl){new Audio(recordedAudioUrl).play();}else{speakText(userAns||'');}};
  document.getElementById('speak-model-btn').onclick=()=>speakText(modelAns);
  document.getElementById('res-model').innerHTML=makeWordTokens(modelAns);
  document.getElementById('res-comment').innerHTML=makeWordTokens(comment);
  askHistory=[];
  askContext={jp:queue[qIdx].jp,en:queue[qIdx].en,userAns,comment};
  document.getElementById('ask-input').value='';
  document.getElementById('ask-response').classList.remove('visible');
  document.getElementById('ask-response').textContent='';
  document.getElementById('res-next-btn').textContent=qIdx+1>=queue.length?'完了':'次へ →';
  document.getElementById('result-overlay').classList.remove('hidden');
}

function nextQ(){
  ttsEnabled=false;
  ttsGen++;
  window.speechSynthesis.cancel();
  document.getElementById('result-overlay').classList.add('hidden');
  qIdx++; loadQuestion();
}

function retryFromResult(){
  document.getElementById('result-overlay').classList.add('hidden');
  isJudging=false; retryQ();
}

function showComplete(){
  stopListening();
  const rate=queue.length?Math.round(correctCount/queue.length*100):0;
  document.getElementById('s-correct').textContent=correctCount;
  document.getElementById('s-total').textContent=queue.length;
  document.getElementById('s-rate').textContent=rate+'%';
  show('complete');
}

function setMicState(state){
  const btn=document.getElementById('mic-btn');
  btn.className='mic-btn '+state;
  const hint=document.getElementById('mic-hint');
  if(state==='listening'){btn.innerHTML=`<svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><rect x="5" y="5" width="14" height="14" rx="2"/></svg>`;hint.textContent='タップで判定';}
  else if(state==='idle'){btn.innerHTML=`<svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>`;hint.textContent='タップして録音開始';}
  else{btn.innerHTML=`<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>`;hint.textContent='判定中...';}
}

function resetMicUI(){
  isJudging=false; isListening=false;
  setMicState('idle');
  document.getElementById('retry-btn').disabled=true;
  updateRing(MAX_SEC);
}

function showTranscript(text){
  const box=document.getElementById('transcript-box');
  const txt=document.getElementById('transcript-txt');
  const ph=document.getElementById('transcript-ph');
  if(text){txt.textContent=text;ph.style.display='none';box.classList.add('active');}
  else{txt.textContent='';ph.style.display='';box.classList.remove('active');}
}

function show(id){
  ['home','quiz','complete','vocab'].forEach(s=>{
    document.getElementById(s).classList.toggle('hidden',s!==id);
  });
}

function goHome(){
  stopListening();
  document.getElementById('result-overlay').classList.add('hidden');
  updateVocabBadge();
  show('home');
}

function shuffle(arr){
  for(let i=arr.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]]=[arr[j],arr[i]];
  }
  return arr;
}

// ── VOCAB ──────────────────────────────────────────
function getVocab(){try{return JSON.parse(localStorage.getItem('lilac_vocab')||'[]');}catch{return[];}}
function setVocab(list){localStorage.setItem('lilac_vocab',JSON.stringify(list));}

function updateVocabBadge(){
  const n=getVocab().length;
  const b=document.getElementById('vocab-badge');
  if(b)b.textContent=n||'0';
}

let toastTimer=null;
function showToast(msg){
  const t=document.getElementById('word-toast');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.classList.remove('show'),2400);
}

function escHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function makeWordTokens(text){
  const vocab=getVocab();
  return escHtml(text).replace(/([a-zA-Z][a-zA-Z’'-]*)/g,(m)=>{
    const clean=m.replace(/[’']/g,"'").replace(/^['-]+|['-]+$/g,'').toLowerCase();
    if(!clean)return m;
    const saved=vocab.some(e=>e.word.toLowerCase()===clean);
    return `<span class="wt${saved?' saved':''}" data-w="${clean}" onclick="saveWord(this)">${m}</span>`;
  });
}

async function saveWord(el){
  const word=el.dataset.w;
  if(!word)return;
  const vocab=getVocab();
  if(vocab.some(e=>e.word.toLowerCase()===word.toLowerCase())){
    showToast('すでに保存済み: '+word);
    return;
  }
  el.classList.add('saving');
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':API_KEY,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({
        model:'claude-haiku-4-5-20251001',max_tokens:30,
        messages:[{role:'user',content:`次の英単語の日本語訳を1〜4語で返してください。JSONのみ: {"meaning":"日本語訳"}\n単語: ${word}`}]
      })
    });
    const data=await res.json();
    const txt=data.content?.[0]?.text||'{}';
    const parsed=JSON.parse(txt.replace(/```json|```/g,'').trim());
    const meaning=parsed.meaning||word;
    vocab.unshift({word,meaning,addedAt:Date.now()});
    setVocab(vocab);
    updateVocabBadge();
    el.classList.remove('saving');
    el.classList.add('saved');
    document.querySelectorAll(`.wt[data-w="${word}"]`).forEach(s=>{s.classList.add('saved');s.classList.remove('saving');});
    showToast('✓  '+word+'  →  '+meaning);
  }catch(e){
    el.classList.remove('saving');
    showToast('保存に失敗しました');
  }
}

function showVocabScreen(){
  renderVocab();
  show('vocab');
}

const PENCIL_SVG=`<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>`;
const CROSS_SVG=`<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>`;
const CHECK_SVG=`<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`;

function renderVocab(){
  const list=getVocab();
  document.getElementById('vocab-count').textContent=list.length?list.length+'語 保存済み':'';
  const el=document.getElementById('vocab-list');
  if(!list.length){
    el.innerHTML='<div class="vocab-empty"><svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>まだ単語が保存されていません。<br>結果画面の英単語をタップして<br>単語帳に追加しましょう！</div>';
    return;
  }
  el.innerHTML=list.map((e,i)=>`<div class="vocab-card" id="vc-${i}">
    <div class="vocab-word">${escHtml(e.word)}</div>
    <div class="vocab-meaning">${escHtml(e.meaning)}</div>
    <button class="vocab-edit-btn" onclick="startEditVocab(${i})" title="編集">${PENCIL_SVG}</button>
    <button class="vocab-del" onclick="deleteVocabIdx(${i})" title="削除">${CROSS_SVG}</button>
  </div>`).join('');
}

function startEditVocab(idx){
  const list=getVocab();
  const e=list[idx];
  if(!e)return;
  const card=document.getElementById('vc-'+idx);
  if(!card)return;
  card.classList.add('editing');
  card.innerHTML=`
    <input class="vocab-input" id="ve-word-${idx}" value="${escHtml(e.word)}" placeholder="フレーズ・単語" style="flex:0 0 110px"/>
    <input class="vocab-input" id="ve-meaning-${idx}" value="${escHtml(e.meaning)}" placeholder="意味" style="flex:1"/>
    <button class="vocab-ok-btn" onclick="confirmEditVocab(${idx})" title="保存">${CHECK_SVG}</button>
    <button class="vocab-del" onclick="renderVocab()" title="キャンセル">${CROSS_SVG}</button>`;
  document.getElementById('ve-word-'+idx).focus();
}

function confirmEditVocab(idx){
  const word=(document.getElementById('ve-word-'+idx).value||'').trim();
  const meaning=(document.getElementById('ve-meaning-'+idx).value||'').trim();
  if(!word)return;
  const list=getVocab();
  list[idx]={...list[idx],word,meaning:meaning||list[idx].meaning};
  setVocab(list);
  renderVocab();
}

function deleteVocabIdx(idx){
  const list=getVocab();
  const card=document.getElementById('vc-'+idx);
  const doDelete=()=>{list.splice(idx,1);setVocab(list);updateVocabBadge();renderVocab();};
  if(card){card.style.transition='opacity .18s,transform .18s';card.style.opacity='0';card.style.transform='translateX(20px)';setTimeout(doDelete,200);}
  else doDelete();
}

async function addVocabManual(){
  const wordEl=document.getElementById('vadd-word');
  const meaningEl=document.getElementById('vadd-meaning');
  const btn=document.getElementById('vadd-btn');
  const word=wordEl.value.trim();
  if(!word)return;
  let meaning=meaningEl.value.trim();
  const list=getVocab();
  if(list.some(e=>e.word.toLowerCase()===word.toLowerCase())){
    showToast('すでに保存済み: '+word);return;
  }
  btn.disabled=true; btn.textContent='取得中…';
  if(!meaning){
    try{
      const res=await fetch('https://api.anthropic.com/v1/messages',{
        method:'POST',
        headers:{'Content-Type':'application/json','x-api-key':API_KEY,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
        body:JSON.stringify({model:'claude-haiku-4-5-20251001',max_tokens:30,
          messages:[{role:'user',content:`次の英語フレーズ・単語の日本語訳を1〜5語で返してください。JSONのみ: {"meaning":"日本語訳"}\nフレーズ: ${word}`}]})
      });
      const data=await res.json();
      const txt=data.content?.[0]?.text||'{}';
      meaning=JSON.parse(txt.replace(/```json|```/g,'').trim()).meaning||word;
    }catch{meaning='';}
  }
  list.unshift({word,meaning:meaning||'',addedAt:Date.now()});
  setVocab(list); updateVocabBadge(); renderVocab();
  wordEl.value=''; meaningEl.value='';
  btn.disabled=false; btn.textContent='+ 追加';
  showToast('✓  '+word+(meaning?'  →  '+meaning:''));
}

function confirmClearVocab(){
  if(!getVocab().length)return;
  if(confirm('全ての単語を削除しますか？')){setVocab([]);updateVocabBadge();renderVocab();}
}
// ────────────────────────────────────────────────────

buildHome();
updateVocabBadge();
</script>
